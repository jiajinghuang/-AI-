<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级答题系统 V3 - 修复版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .title {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 16px;
        }
        
        .form-select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            background-color: white;
        }
        
        .form-select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            font-size: 18px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            font-size: 18px;
        }
        
        /* Progress Section */
        .progress-section {
            margin-bottom: 25px;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .subject-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        
        .progress-info {
            font-size: 14px;
            color: #666;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            border-radius: 4px;
        }
        
        /* Question Section */
        .question-number {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .question-text {
            font-size: 18px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 20px;
        }
        
        .question-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 15px;
            display: block;
        }
        
        .audio-player {
            width: 100%;
            margin-bottom: 20px;
        }
        
        /* Options */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .option-card {
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        
        .option-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }
        
        .option-card.selected {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .option-card.correct {
            border-color: #10b981;
            background: #ecfdf5;
        }
        
        .option-card.wrong {
            border-color: #ef4444;
            background: #fef2f2;
        }
        
        .option-label {
            display: inline-block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            background: #667eea;
            color: white;
            border-radius: 50%;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .option-text {
            display: inline-block;
            vertical-align: top;
            margin-top: 5px;
            font-size: 16px;
            color: #333;
        }
        
        .option-image {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            margin-top: 10px;
            display: block;
        }
        
        /* Feedback */
        .feedback-section {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .feedback-section.show {
            display: block;
        }
        
        .feedback-correct {
            background: #ecfdf5;
            border: 1px solid #10b981;
        }
        
        .feedback-wrong {
            background: #fef2f2;
            border: 1px solid #ef4444;
        }
        
        /* Sections */
        .hidden {
            display: none !important;
        }
        
        /* Complete Section */
        .complete-stats {
            text-align: center;
            margin: 20px 0;
        }
        
        .stat-item {
            display: inline-block;
            margin: 10px 20px;
            padding: 15px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 14px;
            margin-top: 5px;
        }
        
        /* Loading */
        .loading-container {
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Error */
        .error-section {
            text-align: center;
            padding: 40px;
        }
        
        .error-message {
            color: #ef4444;
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        /* Debug Info */
        .debug-info {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 12px;
            color: #666;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Setup Section -->
        <div id="setupSection" class="card">
            <h1 class="title">班级答题系统</h1>
            
            <div class="form-group">
                <label class="form-label">年级</label>
                <select id="gradeSelect" class="form-select">
                    <option value="">请选择年级</option>
                    <option value="一年级">一年级</option>
                    <option value="二年级">二年级</option>
                    <option value="三年级">三年级</option>
                    <option value="四年级">四年级</option>
                    <option value="五年级">五年级</option>
                    <option value="六年级">六年级</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">班级</label>
                <select id="classSelect" class="form-select" disabled>
                    <option value="">请先选择年级</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">周数</label>
                <select id="weekSelect" class="form-select">
                    <option value="">请选择周数</option>
                    <option value="第2周">第2周</option>
                    <option value="第4周">第4周</option>
                    <option value="第6周">第6周</option>
                    <option value="第8周">第8周</option>
                    <option value="第10周">第10周</option>
                    <option value="第12周">第12周</option>
                    <option value="第14周">第14周</option>
                    <option value="第16周">第16周</option>
                    <option value="第18周">第18周</option>
                </select>
            </div>
            
            <button id="startBtn" class="btn btn-primary">开始答题</button>
        </div>
        
        <!-- Loading Section -->
        <div id="loadingSection" class="card hidden">
            <div class="loading-container">
                <div class="loading-spinner"></div>
                <p>正在加载题目...</p>
                <p id="loadingStatus" style="color: #666; font-size: 14px; margin-top: 10px;"></p>
                <div id="debugInfo" class="debug-info" style="margin-top: 20px;"></div>
            </div>
        </div>
        
        <!-- Quiz Section -->
        <div id="quizSection" class="card hidden">
            <div class="progress-section">
                <div class="progress-header">
                    <span id="currentSubject" class="subject-title"></span>
                    <span id="questionProgress" class="progress-info"></span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>
            
            <div id="questionNumber" class="question-number"></div>
            <div id="questionText" class="question-text"></div>
            <div id="imageContainer"></div>
            <div id="audioContainer"></div>
            
            <div id="optionsContainer" class="options-grid"></div>
            
            <div id="feedbackSection" class="feedback-section"></div>
            
            <div style="text-align: center;">
                <button id="submitBtn" class="btn btn-primary">提交答案</button>
                <button id="nextBtn" class="btn btn-next hidden">下一题</button>
            </div>
            
            <div id="quizDebugInfo" class="debug-info" style="margin-top: 15px;"></div>
        </div>
        
        <!-- Subject Complete Section -->
        <div id="subjectCompleteSection" class="card hidden">
            <h2 class="title" style="text-align: center;">🎉 本学科完成！</h2>
            <div id="completeStats" class="complete-stats"></div>
            <p id="nextSubject" style="text-align: center; margin: 20px 0; color: #666;"></p>
            <div style="text-align: center;">
                <button id="continueBtn" class="btn btn-primary">继续下一学科</button>
            </div>
        </div>
        
        <!-- No Questions Section -->
        <div id="noQuestionsSection" class="card hidden">
            <h2 class="title" id="noQuestionsTitle">暂无题目</h2>
            <p id="noQuestionsNext" style="text-align: center; margin: 20px 0; color: #666;"></p>
            <div id="noQuestionsDebug" class="debug-info" style="margin: 15px 0;"></div>
            <div style="text-align: center;">
                <button id="noQuestionsContinueBtn" class="btn btn-primary">继续</button>
            </div>
        </div>
        
        <!-- Final Complete Section -->
        <div id="finalCompleteSection" class="card hidden">
            <h2 class="title" style="text-align: center;">🎊 答题完成！</h2>
            <div id="finalStats" class="complete-stats"></div>
            <div id="submitStatus" style="text-align: center; margin: 15px 0; padding: 10px; border-radius: 5px; display: none;"></div>
            <div id="finalDebug" class="debug-info" style="margin: 15px 0;"></div>
            <div style="text-align: center; margin-top: 30px;">
                <button id="restartBtn" class="btn btn-primary">重新开始</button>
            </div>
        </div>
        
        <!-- Error Section -->
        <div id="errorSection" class="card hidden">
            <div class="error-section">
                <div class="error-message" id="errorMessage"></div>
                <div id="errorDebug" class="debug-info" style="margin: 15px 0;"></div>
                <button onclick="location.reload()" class="btn btn-primary">重新加载</button>
            </div>
        </div>
    </div>

    <script>
        // API配置
        const API_URL = '';//请在此处配置趣味问答题目数据库的API
        
        // 学科顺序
        const SUBJECT_ORDER = ['音乐', '体育', '美术', '心理', '科学', '英语', '信息'];
        
        // 班级配置
        const GRADE_CLASSES = {
            '一年级': 6,
            '二年级': 7,
            '三年级': 6,
            '四年级': 6,
            '五年级': 8,
            '六年级': 9
        };
        
        // 状态管理
        let quizState = {
            grade: '',
            classNum: '',
            week: '',
            allData: [],
            subjectsData: {},
            currentSubjectIndex: 0,
            currentQuestionIndex: 0,
            selectedOption: null,          // 单选题选择的选项
            selectedOptions: [],           // 多选题选择的选项列表
            submitted: false,
            statistics: {},
            classInfo: '',
            subjectAnswers: {},
            currentQuestionType: '单选题'  // 当前题目类型：单选题/多选题
        };
        
        // DOM元素
        const elements = {
            setupSection: document.getElementById('setupSection'),
            loadingSection: document.getElementById('loadingSection'),
            quizSection: document.getElementById('quizSection'),
            subjectCompleteSection: document.getElementById('subjectCompleteSection'),
            noQuestionsSection: document.getElementById('noQuestionsSection'),
            finalCompleteSection: document.getElementById('finalCompleteSection'),
            errorSection: document.getElementById('errorSection'),
            gradeSelect: document.getElementById('gradeSelect'),
            classSelect: document.getElementById('classSelect'),
            weekSelect: document.getElementById('weekSelect'),
            startBtn: document.getElementById('startBtn'),
            loadingStatus: document.getElementById('loadingStatus'),
            debugInfo: document.getElementById('debugInfo'),
            currentSubject: document.getElementById('currentSubject'),
            questionProgress: document.getElementById('questionProgress'),
            progressFill: document.getElementById('progressFill'),
            questionNumber: document.getElementById('questionNumber'),
            questionText: document.getElementById('questionText'),
            imageContainer: document.getElementById('imageContainer'),
            audioContainer: document.getElementById('audioContainer'),
            optionsContainer: document.getElementById('optionsContainer'),
            submitBtn: document.getElementById('submitBtn'),
            feedbackSection: document.getElementById('feedbackSection'),
            nextBtn: document.getElementById('nextBtn'),
            quizDebugInfo: document.getElementById('quizDebugInfo'),
            completeStats: document.getElementById('completeStats'),
            nextSubject: document.getElementById('nextSubject'),
            continueBtn: document.getElementById('continueBtn'),
            noQuestionsTitle: document.getElementById('noQuestionsTitle'),
            noQuestionsNext: document.getElementById('noQuestionsNext'),
            noQuestionsDebug: document.getElementById('noQuestionsDebug'),
            noQuestionsContinueBtn: document.getElementById('noQuestionsContinueBtn'),
            finalStats: document.getElementById('finalStats'),
            restartBtn: document.getElementById('restartBtn'),
            submitStatus: document.getElementById('submitStatus'),
            finalDebug: document.getElementById('finalDebug'),
            errorMessage: document.getElementById('errorMessage'),
            errorDebug: document.getElementById('errorDebug')
        };
        
        // 等待DOM加载完成后初始化事件监听器
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM加载完成，开始初始化事件监听器');
            
            // 重新获取元素引用（确保DOM已加载）
            elements.gradeSelect = document.getElementById('gradeSelect');
            elements.classSelect = document.getElementById('classSelect');
            elements.weekSelect = document.getElementById('weekSelect');
            elements.startBtn = document.getElementById('startBtn');
            elements.submitBtn = document.getElementById('submitBtn');
            elements.nextBtn = document.getElementById('nextBtn');
            elements.continueBtn = document.getElementById('continueBtn');
            elements.noQuestionsContinueBtn = document.getElementById('noQuestionsContinueBtn');
            elements.restartBtn = document.getElementById('restartBtn');
            
            // 检查元素是否存在
            if (!elements.gradeSelect) {
                console.error('找不到年级选择器元素！');
                return;
            }
            
            // 事件监听
            elements.gradeSelect.addEventListener('change', handleGradeChange);
            elements.startBtn.addEventListener('click', startQuiz);
            elements.submitBtn.addEventListener('click', submitAnswer);
            elements.nextBtn.addEventListener('click', nextQuestion);
            // ❌ 删除重复的事件绑定，保留动态的 .onclick 赋值
            // elements.continueBtn.addEventListener('click', nextSubject);
            // elements.noQuestionsContinueBtn.addEventListener('click', nextSubject);
            elements.restartBtn.addEventListener('click', restartQuiz);
            
            console.log('事件监听器初始化完成');
        });
        
        // 更新调试信息
        function updateDebugInfo(elementId, message) {
            const element = document.getElementById(elementId);
            if (element) {
                element.innerHTML = message;
            }
            console.log(`[DEBUG] ${message}`);
        }
        
        // 年级变化处理
        function handleGradeChange() {
            const grade = elements.gradeSelect.value;
            elements.classSelect.innerHTML = '<option value="">请选择班级</option>';
            
            if (grade && GRADE_CLASSES[grade]) {
                elements.classSelect.disabled = false;
                const classCount = GRADE_CLASSES[grade];
                for (let i = 1; i <= classCount; i++) {
                    const option = document.createElement('option');
                    option.value = `${i}班`;
                    option.textContent = `${i}班`;
                    elements.classSelect.appendChild(option);
                }
            } else {
                elements.classSelect.disabled = true;
                elements.classSelect.innerHTML = '<option value="">请先选择年级</option>';
            }
        }
        
        // 开始答题
        async function startQuiz() {
            const grade = elements.gradeSelect.value;
            const classNum = elements.classSelect.value;
            const week = elements.weekSelect.value;
            
            if (!grade || !classNum || !week) {
                showError('请填写完整信息');
                return;
            }
            
            quizState.grade = grade;
            quizState.classNum = classNum;
            quizState.week = week;
            quizState.classInfo = `${grade}${classNum}`;
            
            showSection('loadingSection');
            updateLoadingStatus('正在连接服务器...');
            updateDebugInfo('debugInfo', `开始答题：${quizState.classInfo} ${quizState.week}`);
            
            try {
                updateLoadingStatus('正在获取数据...');
                console.log('开始请求API:', API_URL);
                
                const response = await fetch(API_URL);
                console.log('API响应状态:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('API数据:', data);
                
                updateLoadingStatus('正在处理数据...');

                // 恢复原有的数据获取逻辑
                if (data && data.submissions && Array.isArray(data.submissions)) {
                    quizState.allData = data.submissions;
                    console.log('总数据条数:', quizState.allData.length);
                    updateDebugInfo('debugInfo', `总数据条数：${quizState.allData.length}`);

                    filterSubjectsData();
                
                    updateDebugInfo('debugInfo', `加载的学科：${Object.keys(quizState.subjectsData).join(', ')}<br>学科数量：${Object.keys(quizState.subjectsData).length}`);
                    
                    if (Object.keys(quizState.subjectsData).length === 0) {
                        showError('没有找到对应年级和周数的题目');
                        updateDebugInfo('debugInfo', `错误：没有找到${quizState.grade} ${quizState.week}的题目数据`);
                        return;
                    }
                    
                    updateLoadingStatus('准备开始答题...');
                    
                    quizState.currentSubjectIndex = 0;
                    showSection('quizSection');
                    loadSubject();
                } else {
                    showError('获取题目数据失败：数据格式异常');
                    updateDebugInfo('debugInfo', `数据格式异常：${JSON.stringify(data).substring(0, 200)}`);
                }
            } catch (error) {
                console.error('获取题目失败:', error);
                showError('获取题目数据失败：' + error.message);
                updateDebugInfo('debugInfo', `错误信息：${error.message}`);
            }
        }
        
        // 更新加载状态
        function updateLoadingStatus(message) {
            if (elements.loadingStatus) {
                elements.loadingStatus.textContent = message;
            }
            console.log('加载状态:', message);
        }
        
        // 过滤学科数据
        function filterSubjectsData() {
            quizState.subjectsData = {};
            quizState.statistics = {};
            
            console.log('=== 开始过滤学科数据 ===');
            console.log('当前年级:', quizState.grade);
            console.log('当前周数:', quizState.week);
            console.log('总数据条数:', quizState.allData.length);
            
            // 先打印出匹配当前年级和周数的所有数据
            const gradeWeekData = quizState.allData.filter(item => 
                item.年级 === quizState.grade && 
                item.周数 === quizState.week
            );
            console.log('匹配当前年级周数的数据条数:', gradeWeekData.length);
            
            if (gradeWeekData.length === 0) {
                console.log('⚠️ 没有找到匹配的年级和周数数据');
                return;
            }
            
            gradeWeekData.forEach((item, index) => {
                const submitTime = item.提交时间 || item.submitted_at || '未知';
                console.log(`  [${index}] 学科: ${item.学科}, 题目数: ${item.题目数据 ? item.题目数据.length : 0}, 提交时间: ${submitTime}`);
            });
            
            // 根据年级确定学科范围
            const gradeSubjects = getGradeSubjects(quizState.grade);
            console.log('当前年级应包含的学科:', gradeSubjects.join(', '));
            
            let loadedSubjectsCount = 0;
            
            gradeSubjects.forEach(subject => {
                const subjectData = quizState.allData.filter(item => 
                    item.年级 === quizState.grade && 
                    item.周数 === quizState.week && 
                    item.学科 === subject
                );
                
                console.log(`\n检查学科 ${subject}: 找到 ${subjectData.length} 条记录`);
                
                if (subjectData.length > 0) {
                    // 优先选择"覆盖":false的记录（有效数据），如果没有则选择最新的
                    let selectedData = null;
                    
                    // 先查找覆盖标记为false的记录
                    const validRecords = subjectData.filter(item => item.覆盖 === false);
                    
                    if (validRecords.length > 0) {
                        // 在有效记录中按时间排序，选择最新的
                        validRecords.sort((a, b) => {
                            const timeA = a.提交时间 || a.submitted_at || '';
                            const timeB = b.提交时间 || b.submitted_at || '';
                            return timeB.localeCompare(timeA);
                        });
                        selectedData = validRecords[0];
                    } else {
                        // 如果没有有效记录，选择最新的（可能是覆盖记录）
                        subjectData.sort((a, b) => {
                            const timeA = a.提交时间 || a.submitted_at || '';
                            const timeB = b.提交时间 || b.submitted_at || '';
                            return timeB.localeCompare(timeA);
                        });
                        selectedData = subjectData[0];
                    }
                    
                    const latestTime = selectedData.提交时间 || selectedData.submitted_at || '未知';
                    const isOverride = selectedData.覆盖 === true;
                    
                    console.log(`  - 选择记录: 提交时间=${latestTime}, 题目数=${selectedData.题目数据 ? selectedData.题目数据.length : 0}, 覆盖=${isOverride ? '是' : '否'}`);
                    
                    if (selectedData.题目数据 && selectedData.题目数据.length > 0) {
                        quizState.subjectsData[subject] = selectedData.题目数据;
                        quizState.statistics[subject] = {
                            total: selectedData.题目数据.length,
                            correct: 0
                        };

            // 3-6年级：7门学科（音乐、体育、美术、心理、科学、英语、信息）
            const lowGradeSubjects = ['音乐', '体育', '美术', '心理', '科学'];
            const highGradeSubjects = ['音乐', '体育', '美术', '心理', '科学', '英语', '信息'];

        // 选择选项
        function selectOption(option, cardElement) {
            if (quizState.submitted) return;
            
            // 根据题型选择不同的选择逻辑
            if (quizState.currentQuestionType === '多选题') {
                // 多选题：支持多选
                const index = quizState.selectedOptions.indexOf(option);
                if (index > -1) {
                    // 已经选中，取消选择
                    quizState.selectedOptions.splice(index, 1);
                    cardElement.classList.remove('selected');
                } else {
                    // 未选中，添加选择
                    quizState.selectedOptions.push(option);
                    cardElement.classList.add('selected');
                }
                console.log('多选题已选选项:', quizState.selectedOptions);
            } else {
                // 单选题：只能选一个
                quizState.selectedOption = option;
                
                // 更新选项显示
                document.querySelectorAll('.option-card').forEach(card => {
                    card.classList.remove('selected');
                });
                cardElement.classList.add('selected');
                console.log('单选题已选选项:', quizState.selectedOption);
            }
        }
        
        // 提交答案
        function submitAnswer() {
            // 根据题型检查是否已选择答案
            if (quizState.currentQuestionType === '多选题') {
                if (quizState.selectedOptions.length === 0) {
                    alert('请至少选择一个答案');
                    return;
                }
            } else {
                if (quizState.selectedOption === null) {
                    alert('请选择一个答案');
                    return;
                }
            }
            
            if (quizState.submitted) return;
            
            quizState.submitted = true;
            const currentSubject = SUBJECT_ORDER[quizState.currentSubjectIndex];
            const questions = quizState.subjectsData[currentSubject];
            const question = questions[quizState.currentQuestionIndex];
            
            let isCorrect = false;
            let userAnswer = '';
            
            // 根据题型判断答案是否正确
            if (quizState.currentQuestionType === '多选题') {
                // 多选题：将选中的选项排序后与正确答案比较
                const sortedSelected = quizState.selectedOptions.sort().join(',');
                const sortedCorrect = question.正确答案.split(',').sort().join(',');
                isCorrect = sortedSelected === sortedCorrect;
                userAnswer = quizState.selectedOptions.join(',');
                console.log(`多选题判断: 用户答案[${sortedSelected}] vs 正确答案[${sortedCorrect}] => ${isCorrect}`);
            } else {
                // 单选题：直接比较
                isCorrect = quizState.selectedOption === question.正确答案;
                userAnswer = quizState.selectedOption;
                console.log(`单选题判断: 用户答案[${userAnswer}] vs 正确答案[${question.正确答案}] => ${isCorrect}`);
            }
            
            // 更新统计
            if (isCorrect) {
                quizState.statistics[currentSubject].correct++;
            }
            
            // 保存答题记录 - 只保存题序、学生选择和正确答案
            if (!quizState.subjectAnswers[currentSubject]) {
                quizState.subjectAnswers[currentSubject] = [];
            }
            quizState.subjectAnswers[currentSubject].push({
                题序: question.题序,
                学生答案: userAnswer,
                正确答案: question.正确答案,
                是否正确: isCorrect,
                题型: quizState.currentQuestionType
            });
            console.log(`保存答题记录 - 学科:${currentSubject}, 题序:${question.题序}, 题型:${quizState.currentQuestionType}, 选择:${userAnswer}, 正确:${question.正确答案}, 结果:${isCorrect}`);
            
            // 更新选项显示
            document.querySelectorAll('.option-card').forEach(card => {
                const option = card.dataset.option;
                
                // 根据题型显示不同的标记
                if (quizState.currentQuestionType === '多选题') {
                    // 多选题：检查该选项是否在正确答案中
                    const correctAnswers = question.正确答案.split(',');
                    if (correctAnswers.includes(option)) {
                        card.classList.add('correct');
                    }
                    // 如果选项被选中但不在正确答案中，标记为错误
                    if (quizState.selectedOptions.includes(option) && !correctAnswers.includes(option)) {
                        card.classList.add('wrong');
                    }
                } else {
                    // 单选题：原来的逻辑
                    if (option === question.正确答案) {
                        card.classList.add('correct');
                    } else if (option === quizState.selectedOption && !isCorrect) {
                        card.classList.add('wrong');
                    }
                }
                
                card.style.pointerEvents = 'none';
            });
            
            // 显示反馈
            showFeedback(isCorrect, question);
            
            // 隐藏提交按钮，显示下一题按钮
            elements.submitBtn.classList.add('hidden');
            elements.nextBtn.classList.remove('hidden');
            
            // 移除倒计时自动跳转，避免与点击按钮冲突
            // 只显示静态的"下一题"按钮
            elements.nextBtn.textContent = '下一题';
        }

            elements.feedbackSection.classList.add('show');

                elements.feedbackSection.innerHTML = `

                elements.feedbackSection.innerHTML = `

                    </div>
                `;
            }
        }
        
        // 下一题
        function nextQuestion() {
            const currentSubject = SUBJECT_ORDER[quizState.currentSubjectIndex];
            const questions = quizState.subjectsData[currentSubject];
            
            quizState.currentQuestionIndex++;

                quizState.currentSubjectIndex++;
            }
            
            // 所有学科都完成了
            console.log('所有学科已完成，进入最终总结');
            showFinalComplete();
        }
        
        // 显示无题目
        function showNoQuestions() {
            const currentSubject = SUBJECT_ORDER[quizState.currentSubjectIndex];
            elements.noQuestionsTitle.textContent = `${currentSubject}学科本周暂无题目`;
            
            console.log(`显示无题目界面 - 学科: ${currentSubject}, 年级: ${quizState.grade}, 周数: ${quizState.week}`);
            console.log(`当前学科索引: ${quizState.currentSubjectIndex}, 总学科数: ${SUBJECT_ORDER.length}`);
            console.log('已加载的学科:', Object.keys(quizState.subjectsData));
            
            updateDebugInfo('noQuestionsDebug', `学科：${currentSubject}<br>年级：${quizState.grade}<br>周数：${quizState.week}<br>已加载学科：${Object.keys(quizState.subjectsData).join(', ')}`);
            
            const nextSubjectIndex = quizState.currentSubjectIndex + 1;
            if (nextSubjectIndex < SUBJECT_ORDER.length) {
                elements.noQuestionsNext.textContent = `即将进入下一学科：${SUBJECT_ORDER[nextSubjectIndex]}`;
                elements.noQuestionsContinueBtn.onclick = nextSubject;
            } else {
                elements.noQuestionsNext.textContent = '即将进入最终总结';
                elements.noQuestionsContinueBtn.onclick = showFinalComplete;
            }
            
            showSection('noQuestionsSection');
        }
        
        // 显示最终完成
        async function showFinalComplete() {
            let totalCorrect = 0;
            let totalQuestions = 0;
            let statsHTML = '';
            
            Object.entries(quizState.statistics).forEach(([subject, stats]) => {
                totalCorrect += stats.correct;
                totalQuestions += stats.total;
                const percentage = Math.round((stats.correct / stats.total) * 100);
                statsHTML += `
                    <div class="stat-item">
                        <div class="stat-number">${stats.correct}/${stats.total}</div>
                        <div class="stat-label">${subject}</div>
                    </div>
                `;
            });
            
            const totalPercentage = Math.round((totalCorrect / totalQuestions) * 100);
            
            elements.finalStats.innerHTML = `
                ${statsHTML}
                <div class="stat-item" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
                    <div class="stat-number">${totalCorrect}/${totalQuestions}</div>
                    <div class="stat-label">总计正确</div>
                </div>
                <div class="stat-item" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
                    <div class="stat-number">${totalPercentage}%</div>
                    <div class="stat-label">总分</div>
                </div>
            `;
            
            updateDebugInfo('finalDebug', `完成答题：<br>班级：${quizState.classInfo}<br>周数：${quizState.week}<br>总题数：${totalQuestions}<br>正确数：${totalCorrect}`);
            
            // 发送答题数据到服务器
            await submitQuizResults();
            
            showSection('finalCompleteSection');
        }
        
        // 提交答题结果
        async function submitQuizResults() {
            // 防止重复提交
            if (quizState.isSubmitting) {
                console.log('正在提交中，忽略重复提交');
                return;
            }
            
            quizState.isSubmitting = true;
            console.log('开始提交答题结果...');
            
            // 计算总数
            let totalCorrect = 0;
            let totalQuestions = 0;
            Object.values(quizState.statistics).forEach(stats => {
                totalCorrect += stats.correct;
                totalQuestions += stats.total;
            });
            
            // 构建简化的提交数据结构
            const submitData = {
                classInfo: quizState.classInfo,
                grade: quizState.grade,
                classNum: quizState.classNum,
                week: quizState.week,
                // 统计数据
                statistics: quizState.statistics,
                // 各学科答题记录
                subjectAnswers: quizState.subjectAnswers,
                totalCorrect: totalCorrect,
                totalQuestions: totalQuestions,
                submitTime: new Date().toISOString()
            };
            
            console.log('提交数据结构:', JSON.stringify(submitData, null, 2));
            
            // 显示提交状态
            elements.submitStatus.style.display = 'block';
            elements.submitStatus.style.background = '#e0f2fe';
            elements.submitStatus.style.color = '#0284c7';
            elements.submitStatus.textContent = '📤 正在上传答题数据...';
            
            try {
                const response = await fetch('', {//请在这里配置班级答题详情数据库的API
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(submitData)
                });
                
                console.log('提交响应状态:', response.status);
                
                if (response.ok) {
                    const result = await response.json();
                    console.log('提交成功:', result);
                    elements.submitStatus.style.background = '#ecfdf5';
                    elements.submitStatus.style.color = '#10b981';
                    elements.submitStatus.textContent = '✅ 答题数据上传成功！';
                } else {
                    const errorText = await response.text();
                    console.error('提交失败，HTTP状态:', response.status, errorText);
                    elements.submitStatus.style.background = '#fef2f2';
                    elements.submitStatus.style.color = '#ef4444';
                    elements.submitStatus.textContent = '❌ 数据上传失败，但成绩已保存';
                }
            } catch (error) {
                console.error('提交答题结果失败:', error);
                elements.submitStatus.style.background = '#fef2f2';
                elements.submitStatus.style.color = '#ef4444';
                elements.submitStatus.textContent = '❌ 网络错误，数据上传失败';
                // 即使提交失败也不影响显示成绩
            } finally {
                // 延迟重置提交状态，防止短时间内重复提交
                setTimeout(() => {
                    quizState.isSubmitting = false;
                }, 5000);
            }
        }
        
        // 更新进度
        function updateProgress() {
            const currentSubject = SUBJECT_ORDER[quizState.currentSubjectIndex];
            const questions = quizState.subjectsData[currentSubject];
            const current = quizState.currentQuestionIndex + 1;
            const total = questions.length;
            const percentage = (current / total) * 100;
            
            elements.currentSubject.textContent = `${currentSubject}`;
            elements.questionProgress.textContent = `${current}/${total}`;
            elements.progressFill.style.width = `${percentage}%`;
        }
        
        // 显示错误
        function showError(message) {
            elements.errorMessage.textContent = message;
            showSection('errorSection');
        }
        
        // 显示区域
        function showSection(sectionId) {
            // 隐藏所有区域
            elements.setupSection.classList.add('hidden');
            elements.loadingSection.classList.add('hidden');
            elements.quizSection.classList.add('hidden');
            elements.subjectCompleteSection.classList.add('hidden');
            elements.noQuestionsSection.classList.add('hidden');
            elements.finalCompleteSection.classList.add('hidden');
            elements.errorSection.classList.add('hidden');
            
            // 显示指定区域
            elements[sectionId].classList.remove('hidden');
            console.log(`显示区域: ${sectionId}`);
        }
        
        // 重新开始
        function restartQuiz() {
            // 重置状态
            quizState = {
                grade: '',
                classNum: '',
                week: '',
                allData: [],
                subjectsData: {},
                currentSubjectIndex: 0,
                currentQuestionIndex: 0,
                selectedOption: null,
                submitted: false,
                statistics: {},
                classInfo: '',
                subjectAnswers: {}
            };
            
            // 重置选择框
            elements.gradeSelect.value = '';
            elements.classSelect.value = '';
            elements.classSelect.disabled = true;
            elements.classSelect.innerHTML = '<option value="">请先选择年级</option>';
            elements.weekSelect.value = '';
            
            showSection('setupSection');
        }
        
        // 解析图片链接（支持数组和逗号分隔的字符串）
        function parseImageLinks(imageData) {
            if (!imageData) return [];
            
            // 如果是数组，直接返回
            if (Array.isArray(imageData)) {
                return imageData.filter(link => link && link.trim() !== '');
            }
            
            // 如果是字符串，按逗号分割
            if (typeof imageData === 'string') {
                return imageData.split(',').map(link => link.trim()).filter(link => link !== '');
            }
            
            return [];
        }
        
        // 判断是否为图片URL
        function isImageUrl(str) {
            if (!str || typeof str !== 'string') return false;
            
            const lowerStr = str.trim().toLowerCase();
            
            // 常见图片扩展名
            const imageExtensions = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.svg', '.bmp'];
            
            // 检查是否有图片扩展名
            const hasImageExtension = imageExtensions.some(ext => lowerStr.endsWith(ext));
            
            // 检查是否以http/https开头
            const isHttp = lowerStr.startsWith('http://') || lowerStr.startsWith('https://');
            
            // 检查是否为data URL
            const isDataUrl = lowerStr.startsWith('data:image/');
            
            // 如果是HTTP/HTTPS链接且有图片扩展名，或者是data URL
            return (isHttp && hasImageExtension) || isDataUrl;
        }
    </script>
